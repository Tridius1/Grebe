# Main project settings

# Grebe Configuration

# Name of serial port to which the microcontroller is connected
port = "COM3"

# Add the name of any process you wish to be hidden
blacklist = ["steamwebhelper", "wallpaper64", "SteelSeriesMoments", "SpotifyWidgetProvider", "GameBar", "DiscordHookHelper"]

# Automatically select newly opened applications
select_new_app = true

# How many percentage points should the volume be adjusted per click
volume_scroll_size = 5

# Reverse the effect of spinning a knob
invert_volume = false
invert_navigation = false


# Enable to log additional information. Logs can be found at grebe.log
verbose = true
